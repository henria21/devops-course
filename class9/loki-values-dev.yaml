deploymentMode: SingleBinary

loki:
  auth_enabled: false
  useTestSchema: true
  storage:
    type: filesystem
  commonConfig:
    replication_factor: 1

singleBinary:
  replicas: 1

read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

grafana:
  enabled: false
  sidecar:
    datasources:
      enabled: true
      label: grafana_datasource
      labelValue: "1"
      searchNamespace: ALL
      isDefault: false