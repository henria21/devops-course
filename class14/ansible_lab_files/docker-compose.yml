services:
  ansible-control:
    build:
      context: .
      dockerfile: Dockerfile.control
    container_name: ansible-control
    hostname: ansible-control
    tty: true
    volumes:
      - .:/ansible
      - ssh_keys:/root/.ssh   # entrypoint.sh writes the keypair here
    depends_on:
      - node1
      - node2
    networks:
      - ansible-net

  node1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: node1
    hostname: node1
    ports:
      - "8081:80"
    networks:
      - ansible-net

  node2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: node2
    hostname: node2
    ports:
      - "8082:80"
    networks:
      - ansible-net

