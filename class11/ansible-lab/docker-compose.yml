services:
  node1:
    build: 
      context: .
      dockerfile: Dockerfile.node
    networks:
      ansible_net:
        ipv4_address: 172.20.0.11
  node2:
    build: 
      context: .
      dockerfile: Dockerfile.node
    networks:
      ansible_net:
        ipv4_address: 172.20.0.12

  control:
    build:
      context: .
      dockerfile: Dockerfile.control
    volumes:
      - .:/lab
    stdin_open: true 
    tty: true
    networks:
      ansible_net:
        ipv4_address: 172.20.0.10
